server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=false
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=job-service
spring.cloud.gateway.routes[1].uri=lb://JOB-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/jobs/**

spring.cloud.gateway.routes[2].id=application-service
spring.cloud.gateway.routes[2].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/applications/**

spring.cloud.gateway.routes[3].id=resume-service
spring.cloud.gateway.routes[3].uri=lb://RESUME-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/resumes/**

spring.cloud.gateway.routes[4].id=search-service
spring.cloud.gateway.routes[4].uri=lb://SEARCH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/search/**

spring.cloud.gateway.routes[5].id=analytics-service
spring.cloud.gateway.routes[5].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/analytics/**
